services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: nexus-anvil
    command: anvil --host 0.0.0.0 --port 8545 --block-time 12
    ports:
      - "8545:8545"
    networks:
      - nexus-net

  p4-switch:
    image: ubuntu:22.04
    container_name: nexus-p4
    privileged: true
    ports:
      - "9090:9090"
    volumes:
      - ./p4:/p4
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y git cmake g++ python3-pip libboost-dev libboost-system-dev libboost-thread-dev libboost-program-options-dev libboost-test-dev libboost-filesystem-dev libboost-log-dev libpcap-dev libelf-dev libreadline-dev bison flex &&
        git clone --depth 1 https://github.com/p4lang/p4c.git /p4c &&
        cd /p4c && mkdir build && cd build && cmake .. && make -j4 && make install &&
        git clone --depth 1 https://github.com/p4lang/behavioral-model.git /bmv2 &&
        cd /bmv2 && ./autogen.sh && ./configure && make -j4 && make install &&
        p4c-bm2-ss --p4v 16 /p4/aggregator.p4 -o /p4/aggregator.json &&
        simple_switch --log-console --thrift-port 9090 /p4/aggregator.json
      "
    networks:
      - nexus-net

  sp1-prover:
    image: rust:latest
    container_name: nexus-sp1
    ports:
      - "8081:8080"  # Меняем внешний порт на 8081
    volumes:
      - ./zk:/zk
    working_dir: /zk
    command: bash -c "
      cargo build --release &&
      echo 'SP1 Prover ready' &&
      tail -f /dev/null
      "
    networks:
      - nexus-net

  validator:
    build: .
    container_name: nexus-validator
    command: ["/app/validator", "-port", "8001"]
    ports:
      - "8001:8001"
    environment:
      - ETHEREUM_RPC_URL=http://anvil:8545
    volumes:
      - ./logs:/app/logs
    depends_on:
      - anvil
    networks:
      - nexus-net

  multiplexer:
    build: .
    container_name: nexus-multiplexer
    command: ["/app/multiplexer"]
    ports:
      - "8002:8002"
      - "8080:8080"  # Оставляем 8080 для мультиплексора
    environment:
      - P4_SWITCH_ADDR=p4-switch:9090
    volumes:
      - ./logs:/app/logs
    depends_on:
      - p4-switch
      - validator
    networks:
      - nexus-net
    stdin_open: true
    tty: true

networks:
  nexus-net:
    driver: bridge
