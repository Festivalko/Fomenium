services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:nightly
    container_name: nexus-anvil
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--block-time", "2"]
    ports:
      - "8545:8545"
    networks:
      - nexus-net

  p4-switch:
    build:
      context: .
      dockerfile: docker/Dockerfile.p4
    container_name: nexus-p4
    privileged: true
    ports:
      - "9090:9090"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sp1-prover:
    build:
      context: .
      dockerfile: docker/Dockerfile.sp1
    container_name: nexus-sp1
    ports:
      - "8081:8080"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  validator:
    build:
      context: .
      dockerfile: docker/Dockerfile.validator
    container_name: nexus-validator
    ports:
      - "8001:8001"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  multiplexer:
    build:
      context: .
      dockerfile: docker/Dockerfile.multiplexer
    container_name: nexus-multiplexer
    ports:
      - "8080:8080"
    environment:
      - P4_SWITCH_ADDR=p4-switch:9090
      - SP1_PROVER_URL=http://sp1-prover:8080
      - VALIDATOR_ADDR=validator:8001
      - ETHEREUM_RPC_URL=http://anvil:8545
    depends_on:
      - anvil
      - p4-switch
      - sp1-prover
      - validator
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge
